<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Pink Hanging Chair — Idea Garden</title>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Nunito+Sans:wght@400;600;700&display=swap');

* { box-sizing: border-box; }
body { margin: 0; }

.phc-root {
  --bg: #fdf1f4;
  --card: #fffbfc;
  --line: #f0c3d4;
  --line-soft: #f9dfe8;
  --ink: #47222f;
  --ink-soft: #8a5566;
  --rose: #c2436f;
  --rose-deep: #832349;
  --leaf: #5f8f6d;
  --gold: #d4a24c;
  --draft: #b7a6c9;
  --progress: #e0a75e;
  --complete: #5f8f6d;
  --missing: #d97a7a;
  font-family: 'Nunito Sans', sans-serif;
  background: linear-gradient(180deg, var(--bg), #fbeaf0 60%, #fdf3f6);
  min-height: 100vh;
  color: var(--ink);
  padding-bottom: 60px;
}
.phc-header { position: relative; padding: 34px 24px 26px; text-align: center; overflow: hidden; }
.phc-thread {
  position: absolute; top: 14px; left: 0; right: 0; height: 1px;
  background: repeating-linear-gradient(90deg, var(--line) 0 8px, transparent 8px 14px);
}
.phc-header-inner { display: inline-flex; align-items: center; gap: 14px; }
.phc-header-emblem {
  font-size: 30px; background: var(--card); border: 1px solid var(--line);
  border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 14px rgba(140, 60, 90, 0.12);
}
.phc-title { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 600; color: var(--rose-deep); margin: 0; letter-spacing: 0.2px; }
.phc-subtitle { margin: 2px 0 0; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--ink-soft); }
.phc-savenote { margin: 8px 0 0; font-size: 11.5px; color: var(--ink-soft); opacity: 0.85; }

.phc-toolbar { display: flex; gap: 12px; align-items: center; justify-content: space-between; max-width: 1040px; margin: 0 auto 14px; padding: 0 20px; flex-wrap: wrap; }
.phc-search { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 9px 16px; flex: 1; min-width: 220px; }
.phc-search input { border: none; outline: none; background: transparent; flex: 1; font-size: 14px; color: var(--ink); font-family: inherit; }
.phc-search-icon { color: var(--rose); flex-shrink: 0; }
.phc-actions { display: flex; gap: 8px; }

.phc-btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 999px; border: 1px solid var(--line); background: var(--card); color: var(--rose-deep); font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; transition: transform .12s ease, background .12s ease; }
.phc-btn:hover { background: var(--line-soft); }
.phc-btn:active { transform: scale(0.97); }
.phc-btn-primary { background: var(--rose); color: #fff; border-color: var(--rose); }
.phc-btn-primary:hover { background: var(--rose-deep); }

.phc-filters { display: flex; gap: 8px; max-width: 1040px; margin: 0 auto 14px; padding: 0 20px; flex-wrap: wrap; }
.phc-filter { padding: 7px 14px; border-radius: 999px; border: 1px solid var(--line); background: transparent; color: var(--ink-soft); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.phc-filter.active { background: var(--rose-deep); color: #fff; border-color: var(--rose-deep); }

.phc-databar { display: flex; align-items: center; gap: 8px; max-width: 1040px; margin: 0 auto 22px; padding: 10px 20px; flex-wrap: wrap; }
.phc-databar-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); font-weight: 700; margin-right: -2px; }
.phc-databar-sep { width: 1px; height: 18px; background: var(--line); margin: 0 4px; }
.phc-chip { display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 999px; border: 1px solid var(--line-soft); background: #fff; color: var(--rose-deep); font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
.phc-chip:hover { background: var(--line-soft); }

.phc-grid { max-width: 1040px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
.phc-empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--ink-soft); }
.phc-empty p { margin: 4px 0; }
.phc-empty-sub { font-size: 13px; }

.phc-card { position: relative; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px 16px 14px; box-shadow: 0 6px 16px rgba(150, 70, 100, 0.08); display: flex; flex-direction: column; gap: 8px; }
.phc-card-peg { position: absolute; top: -7px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: var(--rose); border-radius: 50%; box-shadow: 0 0 0 3px var(--card); }
.phc-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.phc-card-emoji { font-size: 22px; line-height: 1; }
.phc-star { background: none; border: none; cursor: pointer; color: var(--line); padding: 0; }
.phc-star.on { color: var(--gold); }
.phc-card-title { font-family: 'Fraunces', serif; font-size: 18px; margin: 0; color: var(--ink); font-weight: 600; }
.phc-card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.phc-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: var(--line-soft); color: var(--rose-deep); }
.phc-status-draft { background: #eee6f4; color: #6e5486; }
.phc-status-in-progress { background: #fbeed8; color: #9c6a1f; }
.phc-status-complete { background: #e2f0e9; color: #3f7960; }
.phc-status-missing-something { background: #fbe4e4; color: #a34848; }
.phc-card-topics { display: flex; flex-wrap: wrap; gap: 5px; }
.phc-tag { font-size: 11px; background: #f6dbe6; color: var(--rose-deep); padding: 3px 9px; border-radius: 999px; }
.phc-tag-removable { cursor: pointer; display: inline-flex; align-items: center; gap: 3px; }
.phc-card-actions { display: flex; gap: 6px; margin-top: auto; padding-top: 8px; border-top: 1px dashed var(--line-soft); }
.phc-card-actions button { flex: 1; display: flex; align-items: center; justify-content: center; padding: 7px 0; border-radius: 10px; border: none; background: transparent; color: var(--rose-deep); cursor: pointer; }
.phc-card-actions button:hover { background: var(--line-soft); }
.phc-danger:hover { background: #fbe0e0 !important; color: #a33 !important; }

.phc-overlay { position: fixed; inset: 0; background: rgba(70, 30, 45, 0.35); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
.phc-modal { background: #fffdfd; border-radius: 18px; max-width: 620px; width: 100%; max-height: 88vh; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(90, 30, 55, 0.25); }
.phc-modal-head { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--line-soft); }
.phc-modal-head h2 { font-family: 'Fraunces', serif; font-size: 20px; margin: 0; color: var(--rose-deep); }
.phc-modal-title { display: flex; align-items: center; gap: 10px; }
.phc-modal-title h2 { font-size: 20px; }
.phc-icon-btn { background: none; border: none; cursor: pointer; color: var(--ink-soft); padding: 4px; }
.phc-modal-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
.phc-modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 14px 22px; border-top: 1px solid var(--line-soft); }

.phc-view-row { margin-bottom: 12px; }
.phc-view-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-soft); font-weight: 700; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
.phc-view-value { font-size: 14.5px; white-space: pre-wrap; line-height: 1.5; }
.phc-view-heading { font-family: 'Fraunces', serif; color: var(--rose-deep); font-size: 15px; margin: 18px 0 8px; border-bottom: 1px dashed var(--line-soft); padding-bottom: 4px; }
.phc-private { background: #fbeef2; border-radius: 10px; padding: 10px 12px; }
.phc-media-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.phc-thumb { width: 76px; height: 76px; object-fit: cover; border-radius: 10px; border: 1px solid var(--line); }
.phc-thumb-wrap { position: relative; }
.phc-thumb-x { position: absolute; top: -6px; right: -6px; background: var(--rose-deep); color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.phc-audio-list { display: flex; flex-direction: column; gap: 6px; }
.phc-audio-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: var(--line-soft); border-radius: 10px; padding: 6px 10px; }
.phc-audio-name { font-size: 13px; }

.pf-label { font-size: 11.5px; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 700; color: var(--ink-soft); display: block; margin: 10px 0 4px; }
.pf-input, .pf-textarea, select.pf-input { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; font-size: 14px; font-family: inherit; color: var(--ink); background: #fff; box-sizing: border-box; }
.pf-textarea { min-height: 64px; resize: vertical; }
.pf-input:focus, .pf-textarea:focus { outline: 2px solid var(--rose); outline-offset: 1px; }
.pf-row { display: flex; gap: 12px; }
.pf-row > div { flex: 1; min-width: 0; }
.pf-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.pf-combo { display: flex; gap: 6px; }
.pf-addbtn { flex-shrink: 0; background: var(--rose); color: #fff; border: none; border-radius: 10px; width: 38px; cursor: pointer; }
.pf-addbtn:hover { background: var(--rose-deep); }
.pf-favorite { display: flex; align-items: center; gap: 6px; margin-top: 14px; font-size: 13.5px; font-weight: 600; color: var(--rose-deep); cursor: pointer; }
.pf-emoji-pick { width: 130px; }
.pf-emoji-input { text-align: center; font-size: 18px; }
.pf-emoji-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.pf-emoji-opt { background: var(--line-soft); border: none; border-radius: 8px; width: 26px; height: 26px; cursor: pointer; font-size: 14px; }
.pf-emoji-opt:hover { background: var(--line); }
.pf-file { font-size: 13px; margin: 4px 0 10px; }

.pf-section { border: 1px solid var(--line-soft); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
.pf-section-head { width: 100%; display: flex; justify-content: space-between; align-items: center; background: var(--line-soft); border: none; padding: 10px 14px; font-family: 'Fraunces', serif; font-size: 14.5px; color: var(--rose-deep); font-weight: 600; cursor: pointer; }
.pf-section-body { padding: 12px 14px; }

@media (max-width: 520px) {
  .pf-row { flex-direction: column; }
  .pf-grid-2 { grid-template-columns: 1fr; }

.phc-login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, #fdf1f4, #fbeaf0 60%, #fdf3f6); padding: 20px; }
.phc-login-card { background: #fffbfc; border: 1px solid #f0c3d4; border-radius: 18px; padding: 32px 28px; width: 100%; max-width: 360px; box-shadow: 0 12px 30px rgba(140, 60, 90, 0.14); text-align: center; }

.phc-login-title { font-family: 'Fraunces', serif; font-size: 24px; color: #832349; margin: 0 0 2px; }

.phc-login-card .pf-input { margin-bottom: 12px; text-align: left; }
.phc-login-error { color: #a34848; font-size: 13px; margin: -4px 0 12px; }
.phc-login-card .phc-btn-primary { width: 100%; justify-content: center; }
.phc-logout-link { position: absolute; top: 14px; right: 18px; background: none; border: none; color: #8a5566; font-size: 12.5px; cursor: pointer; text-decoration: underline; font-family: inherit; }
.phc-loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #8a5566; font-family: 'Nunito Sans', sans-serif; }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(70, 30, 45, 0.35);
  display: none; align-items: center; justify-content: center;
  padding: 20px; z-index: 300;
}
.modal-overlay.open { display: flex; }

.modal {
  background: #fffdfd;
  border-radius: 18px;
  max-width: 620px; width: 100%;
  max-height: 88vh; overflow-y: auto;
  padding: 22px;
  box-shadow: 0 20px 50px rgba(90, 30, 55, 0.25);
  font-family: 'Nunito Sans', sans-serif;
  color: #47222f;
}

.modal-title {
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'Fraunces', serif;
  font-size: 20px; color: #832349;
  margin-bottom: 14px;
}
.modal-close {
  background: none; border: none; font-size: 22px;
  cursor: pointer; color: #8a5566;
}

.form-row { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 11.5px; letter-spacing: 0.5px;
  text-transform: uppercase; font-weight: 700; color: #8a5566;
  margin-bottom: 4px;
}
.form-input, .form-textarea, .form-select {
  width: 100%; border: 1px solid #f0c3d4; border-radius: 10px;
  padding: 9px 12px; font-size: 14px; font-family: inherit;
  color: #47222f; background: #fff; box-sizing: border-box;
}
.form-textarea { min-height: 64px; resize: vertical; }
.form-input:focus, .form-textarea:focus, .form-select:focus {
  outline: 2px solid #c2436f; outline-offset: 1px;
}

.list-add-row { display: flex; gap: 8px; margin-bottom: 6px; }
.list-add-row .form-input { flex: 1; }
.list-item {
  display: flex; justify-content: space-between; align-items: center;
  background: #f9dfe8; border-radius: 10px;
  padding: 6px 10px; margin-bottom: 5px; gap: 8px;
}
.list-item-text { font-size: 13px; color: #47222f; flex: 1; }
.list-item-del {
  background: none; border: none; color: #832349;
  font-size: 18px; cursor: pointer; line-height: 1;
}

.btn-small {
  background: #fff; border: 1px solid #f0c3d4; border-radius: 10px;
  padding: 7px 12px; font-size: 13px; font-weight: 600;
  color: #832349; cursor: pointer; white-space: nowrap;
}
.btn-small:hover { background: #f9dfe8; }

.btn-primary {
  width: 100%; background: #c2436f; color: #fff;
  font-weight: 700; font-size: 15px; border: none;
  border-radius: 12px; padding: 12px; cursor: pointer; margin-bottom: 9px;
}
.btn-primary:hover { background: #832349; }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

.btn-ghost {
  width: 100%; background: transparent; color: #832349;
  font-weight: 700; font-size: 14px; border: 1px solid #c2436f;
  border-radius: 12px; padding: 11px; cursor: pointer;
}

.star-toggle {
  background: none; border: 1px solid #d4a24c; border-radius: 10px;
  padding: 9px 14px; font-size: 14px; cursor: pointer;
  color: #d4a24c; font-weight: 700;
}
.star-toggle.active { background: #d4a24c; color: #fff; }

.topic-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.chip {
  padding: 5px 12px; border-radius: 999px; font-size: 12px;
  font-weight: 600; border: 1px solid #f0c3d4; background: #fff;
  color: #8a5566; cursor: pointer;
}
.chip.active { background: #832349; color: #fff; border-color: #832349; }

.image-preview {
  max-width: 100%; max-height: 150px; border-radius: 10px;
  margin-top: 6px; border: 1px solid #f0c3d4;
  display: none; object-fit: cover;
}
.form-file { font-size: 13px; margin: 4px 0 10px; }
.audio-player { width: 100%; margin-top: 4px; }
</style>
